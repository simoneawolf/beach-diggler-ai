<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Diggler System Warning</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

   

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: #020617;

  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(18px, 5vw, 42px);
  overflow-x: hidden;

  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background-image: url("assets/einhorn.png");
  background-size: 200px auto;
  background-repeat: repeat;
  background-position: center;

  opacity: 0.45;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;

  background: linear-gradient(
    rgba(2, 6, 23, 0.45),
    rgba(2, 6, 23, 0.70)
  );

  z-index: -1;
}
  margin: 0;
  padding: 0;



    
warning-box {
      width: min(900px, 100%);
      padding: clamp(24px, 6vw, 52px);
      border-radius: clamp(20px, 4vw, 34px);
      background: rgba(2, 6, 23, 0.68);
      border: 3px solid #ef4444;
      box-shadow:
        0 0 30px rgba(239, 68, 68, 0.55),
        0 0 70px rgba(239, 68, 68, 0.28),
        inset 0 0 22px rgba(239, 68, 68, 0.18);
      text-align: center;
      backdrop-filter: blur(6px);
    }

  z-index: 1;


    .warning-text {
      margin: 0;
      color: #ff2d2d;
      font-size: clamp(26px, 7vw, 62px);
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow:
        0 0 3px #7f0000,
        0 0 8px #ff0000,
        0 0 16px rgba(255, 0, 0, 0.9),
        0 0 30px rgba(239, 68, 68, 0.9);
    }

    .warning-text span {
      display: block;
      margin-top: clamp(18px, 4vw, 30px);
      color: #ffffff;
      font-size: clamp(18px, 4.5vw, 34px);
      text-transform: none;
      line-height: 1.35;
      text-shadow:
        0 0 3px #7f0000,
        0 0 8px #ff0000,
        0 0 18px rgba(239, 68, 68, 0.9);
    }

    .back-link {
      display: inline-block;
      margin-top: clamp(28px, 6vw, 46px);
      padding: 14px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #7f1d1d, #0f172a);
      color: #ffffff;
      text-decoration: none;
      border: 2px solid #ef4444;
      font-weight: bold;
      font-size: clamp(14px, 3.5vw, 17px);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.42);
      transition: 0.2s ease;
    }

    .back-link:hover {
      transform: scale(1.05);
      border-color: #facc15;
      box-shadow: 0 0 28px rgba(250, 204, 21, 0.45);
    }

    @media (max-width: 700px) {
      body {
        background-position: center top;
      }

      .warning-box {
        background: rgba(2, 6, 23, 0.72);
      }
    }
  </style>
</head>

<body>

  <main class="warning-box">
    <p class="warning-text">
      ⚠ WARNING:
      <span>
        Model confidence unstable.<br />
        Reason: Too much sand in system.<br />
        Solution: Have fun at the EP-2x Sommerfest, drink beer &amp; try again later.
      </span>
    </p>

    <a class="back-link" href="index.html">← Back to Beach Diggler AI</a>
  </main>

</body>
</html>
